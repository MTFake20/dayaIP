<!DOCTYPE html>
<html lang="es">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis Citas</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
  body {
    font-family: 'Poppins', sans-serif;
  }

  .mobile-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .page-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    text-align: left;
}

  .calendar-box {
    width: 100%;
    max-width: 260px;
    margin: 0 auto;
  }

  .calendar-box h3 {
    text-align: center;
  }

  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: #888;
    margin-bottom: 4px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    justify-content: center;
  }

  .calendar-grid div {
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 28px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #f2f2f2;
    font-size: 0.7rem;
    font-weight: 500;
    color: #333;
    transition: background 0.2s, color 0.2s;
  }

  .calendar-grid div.empty {
    background: transparent;
  }

  .calendar-grid div.active-day {
    background: #4caf93;
    color: #fff;
    font-weight: 700;
  }

  /* --- Tarjeta de cita estilo imagen --- */
  .appointment-card {
    width: 100%;
    max-width: 280px;
    margin: 16px auto 0;
    text-align: left;
    background: #fff;
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }

  .appointment-card h3 {
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #222;
    margin: 0 0 12px 0;
  }

  .appointment-card p {
    font-family: 'Poppins', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: #333;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
  }
</style>

</head>
<body>

<div class="mobile-container">

    <div class="page-header">

        <a href="inicio.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2>Mis Citas</h2>

    </div>

            <div>M</div>
            <div>X</div>
            <div>J</div>

        </div>

        <div class="calendar-grid">

            <div class="empty"></div>
            <div class="empty"></div>
            <div class="empty"></div>
            <div>1</div>
            <div>2</div>
            <div>3</div>

            <div>5</div>

            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div>10</div>
            <div>11</div>

            <div>12</div>
            <div class="active-day">13</div>
            <div>14</div>
            <div>15</div>

            <div>19</div>

    </div>

    <div class="appointment-card">

        <p>📍 Centro de Salud Lambayeque</p>

    </div>

</div>

</body>
</html>
